name: Build APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [smartphone, tv]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      - run: chmod +x gradlew
      - run: ./gradlew :app:${{ matrix.target }}:assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: tv-cyber-mozess-${{ matrix.target }}
          path: app/${{ matrix.target }}/build/outputs/apk/release/*.apk
